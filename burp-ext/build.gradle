plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

repositories { mavenCentral() }

dependencies {
    // Provided by Burp at runtime — compile against it, don't bundle it.
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2023.12.1'
    // Bundled into the jar (shaded) so Burp can load it.
    implementation 'com.google.code.gson:gson:2.10.1'
}

java {
    toolchain { languageVersion = JavaLanguageVersion.of(17) }
}

// `gradle shadowJar` -> build/libs/firestore-workbench-burp.jar  (load this in Burp)
shadowJar {
    archiveBaseName = 'firestore-workbench-burp'
    archiveClassifier = ''
    archiveVersion = ''
}

build.dependsOn shadowJar
